name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Xmx2g

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Install Android SDK packages
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gradle
        run: |
          curl -sSLO https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip -d gradle
          echo "GRADLE_HOME=$(pwd)/gradle/gradle-8.10.2" >> $GITHUB_ENV
          echo "PATH=$(pwd)/gradle/gradle-8.10.2/bin:$PATH" >> $GITHUB_ENV

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android APK
        working-directory: android
        run: |
          set -e
          # Skip the project's gradlew wrapper entirely — it has been
          # unreliable at resolving its own APP_HOME in this environment.
          # We always use the Gradle installed manually in the step above.
          gradle assembleRelease --no-daemon --stacktrace --info -Pandroid.native.buildOutput=verbose

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: android/app/build/outputs/apk/**/release/*.apk
